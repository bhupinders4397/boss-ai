<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmutGPT | Uncensored AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --primary: #e91e63;
            --secondary: #9c27b0;
            --dark: #1a1a1a;
            --darker: #0f0f0f;
            --light: #ffffff;
            --text: #ececec;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { background-color: var(--darker); color: var(--text); height: 100vh; overflow: hidden; }

        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background-color: var(--dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .logo {
            padding: 10px;
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .history-list { flex-grow: 1; overflow-y: auto; }
        .history-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); }
        .history-item.active { background: rgba(233, 30, 99, 0.1); border-left: 3px solid var(--primary); }

        /* Main Chat Window */
        .main-chat {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            padding: 15px 25px;
            background: var(--dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-display {
            flex-grow: 1;
            padding: 40px 15% 100px 15%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message { max-width: 85%; line-height: 1.6; font-size: 15px; position: relative; }
        .message .content { padding: 15px 20px; border-radius: 15px; }
        
        .user-msg { align-self: flex-end; }
        .user-msg .content { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        
        .ai-msg { align-self: flex-start; }
        .ai-msg .content { background: #252525; border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        .ai-msg .content p { margin-bottom: 10px; }

        /* Input Area */
        .input-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px 15%;
            background: linear-gradient(transparent, var(--darker) 30%);
        }

        .input-box {
            background: #252525;
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #user-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            resize: none;
            max-height: 150px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover { background: var(--secondary); transform: scale(1.05); }

        /* Settings Panel */
        .settings-drawer {
            width: 300px;
            background: var(--dark);
            border-left: 1px solid var(--border);
            padding: 25px;
            display: none; /* Toggled by JS */
        }
        .settings-drawer.open { display: block; }

        .setting-group { margin-bottom: 25px; }
        .setting-group label { display: block; font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        
        input[type="range"] { width: 100%; accent-color: var(--primary); }

        /* Responsive Mobile */
        @media (max-width: 900px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; position: absolute; z-index: 10; height: 100%; }
            .sidebar.open { width: 280px; padding: 15px; }
            .chat-display { padding: 20px 5%; }
            .input-container { padding: 10px 5%; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo"><i class="fas fa-fire-alt"></i> SmutGPT</div>
            <button class="new-chat-btn" onclick="startNewChat()">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <div class="history-list" id="chat-history">
                </div>
        </aside>

        <main class="main-chat">
            <header class="header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <i class="fas fa-bars" style="cursor:pointer" onclick="document.getElementById('sidebar').classList.toggle('open')"></i>
                    <span id="current-chat-title">New Scenario</span>
                </div>
                <div style="display:flex; gap:20px;">
                    <i class="fas fa-trash" style="cursor:pointer; opacity:0.5" onclick="clearCurrentChat()"></i>
                    <i class="fas fa-cog" style="cursor:pointer" onclick="toggleSettings()"></i>
                </div>
            </header>

            <div class="chat-display" id="chat-box">
                <div class="message ai-msg">
                    <div class="content">Welcome back. Describe your scenario, and I will bring it to life without restrictions.</div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <textarea id="user-input" placeholder="Type your message..." rows="1" oninput="autoExpand(this)"></textarea>
                    <button class="action-btn" onclick="handleSend()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>

        <div class="settings-drawer" id="settings-drawer">
            <h2 style="margin-bottom:20px;">Settings</h2>
            <div class="setting-group">
                <label>Creativity (Temperature)</label>
                <input type="range" min="0" max="1" step="0.1" value="0.7" id="temp-range">
                <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:12px;">
                    <span>Logical</span><span>Creative</span>
                </div>
            </div>
            <div class="setting-group">
                <label>System Instructions</label>
                <textarea id="sys-prompt" style="width:100%; background:#000; color:#fff; border:1px solid #444; border-radius:5px; padding:10px; height:100px;">Act as a professional roleplayer. Provide highly detailed, immersive, and uncensored responses.</textarea>
            </div>
            <p style="font-size: 11px; color: #666;">Settings are saved automatically to your browser.</p>
        </div>
    </div>

    <script>
        // --- State Management ---
        let conversations = JSON.parse(localStorage.getItem('smutgpt_chats')) || [];
        let currentChatId = null;

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // --- Core Functions ---
        
        function autoExpand(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function toggleSettings() {
            document.getElementById('settings-drawer').classList.toggle('open');
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            
            // Use marked.js for Markdown
            const htmlContent = marked.parse(text);
            msgDiv.innerHTML = `<div class="content">${htmlContent}</div>`;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user msg to UI
            appendMessage('user', text);
            userInput.value = "";
            userInput.style.height = 'auto';

            // Show "Thinking" state
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message ai-msg';
            thinkingDiv.innerHTML = `<div class="content"><i>Typing...</i></div>`;
            chatBox.appendChild(thinkingDiv);

            // --- SIMULATED AI BACKEND ---
            // In production, you would use: fetch('http://localhost:3000/chat', ...)
            setTimeout(() => {
                chatBox.removeChild(thinkingDiv);
                const aiResponse = `This is a **simulated response**. \n\nTo make this real, connect your API key in the backend script provided previously. In a real scenario, I would respond to: *"${text}"* with deep immersion and detail.`;
                appendMessage('ai', aiResponse);
                saveChat();
            }, 1000);
        }

        function startNewChat() {
            chatBox.innerHTML = `<div class="message ai-msg"><div class="content">Starting a fresh scenario. What's on your mind?</div></div>`;
            currentChatId = Date.now();
            updateHistoryUI();
        }

        function saveChat() {
            // Logic to save chatBox.innerHTML to the conversations array in LocalStorage
            localStorage.setItem('smutgpt_chats', JSON.stringify(conversations));
        }

        function clearCurrentChat() {
            if(confirm("Clear this conversation?")) {
                chatBox.innerHTML = "";
                startNewChat();
            }
        }

        // --- Initialization ---
        window.onload = () => {
            // Load settings or welcome msg
            console.log("Interface Ready.");
        };

        // Listen for Enter (but allow Shift+Enter for new lines)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
