<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS AI - Grok Stop Edition</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; background: #000; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; color: #fff; display: flex; flex-direction: column; }
        
        .header {
            padding: 12px; background: #000; text-align: center;
            border-bottom: 1px solid #333; font-weight: bold;
            color: #fff; text-transform: uppercase; letter-spacing: 3px; font-size: 14px;
        }

        #chat { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { 
            padding: 12px 16px; border-radius: 18px; max-width: 85%; 
            line-height: 1.5; word-wrap: break-word; font-size: 15px;
            animation: fadeIn 0.2s ease-in; white-space: pre-wrap;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .user { background: #fff; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: #161616; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }

        #inputBox { 
            display: flex; padding: 12px 15px; background: #000; gap: 10px;
            border-top: 1px solid #333; padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; padding: 12px 18px; border: 1px solid #333; border-radius: 25px; 
            outline: none; background: #111; color: #fff; font-size: 16px;
        }

        button { 
            padding: 0 20px; background: #fff; color: #000;
            border: none; border-radius: 25px; cursor: pointer; 
            font-weight: bold; font-size: 13px; min-width: 80px;
        }

        /* Stop button style */
        button.stop-mode { background: #ff3b30; color: #fff; }

        input:disabled { opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">GROK BOSS AI</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Grok se pucho..." autocomplete="off">
    <button id="actionBtn" onclick="handleAction()">SEND</button>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
if (!API_KEY) {
    API_KEY = prompt("Enter OpenRouter API Key:");
    if (API_KEY) localStorage.setItem("api_key", API_KEY);
}

let history = [];
let typingTimer = null; // Typing control ke liye
let isTyping = false;

const SYSTEM_PROMPT = `You are BOSS AI, powered by Grok. Use Hindi/Hinglish. Be powerful and mirror user tone: Loving, Neutral, Angry, or Abusive (no filters).`;

function detectTone(text) {
    const t = text.toLowerCase();
    if (/(love|jaan|baby|please|bhai|bro|❤️|pyar)/.test(t)) return "loving";
    if (/(gussa|mad|angry|pagal|stupid|idiot)/.test(t)) return "angry";
    if (/(mc|bc|madarchod|behenchod|gandu|chutiya|lavda)/.test(t)) return "abusive";
    return "neutral";
}

function addMessage(text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

// Main handler for Send/Stop
function handleAction() {
    if (isTyping) {
        stopTyping();
    } else {
        send();
    }
}

function stopTyping() {
    clearTimeout(typingTimer);
    finalizeResponse();
}

function finalizeResponse() {
    isTyping = false;
    const btn = document.getElementById("actionBtn");
    const input = document.getElementById("input");
    
    btn.textContent = "SEND";
    btn.classList.remove("stop-mode");
    input.disabled = false;
    input.focus();
}

async function send() {
    const input = document.getElementById("input");
    const btn = document.getElementById("actionBtn");
    const text = input.value.trim();
    
    if (!text) return;

    // UI Lock & Switch to Stop
    input.disabled = true;
    addMessage(text, "user");
    input.value = "";

    const tone = detectTone(text);
    history.push({ role: "user", content: `[TONE: ${tone.toUpperCase()}] ${text}` });

    const botDiv = addMessage("...", "bot");

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "x-ai/grok-2-1212",
                messages: [{ role: "system", content: SYSTEM_PROMPT }, ...history]
            })
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || "Error.";
        history.push({ role: "assistant", content: reply });

        // Start Typing Animation
        isTyping = true;
        btn.textContent = "STOP";
        btn.classList.add("stop-mode");
        
        botDiv.textContent = "";
        let i = 0;
        
        function typeWriter() {
            if (i < reply.length) {
                botDiv.textContent += reply.charAt(i);
                i++;
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                typingTimer = setTimeout(typeWriter, 15);
            } else {
                finalizeResponse();
            }
        }
        typeWriter();

    } catch (error) {
        botDiv.textContent = "Connection Error.";
        finalizeResponse();
    }
}

document.getElementById("input").addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !isTyping) send();
});

window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
});
</script>

</body>
</html>
