<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI | Elite Interface</title>

<style>
  :root {
    --primary-glow: #00f2fe;
    --secondary-glow: #4facfe;
    --accent: #19c37d;
    --bg-dark: #0a0b10;
    --panel-bg: rgba(23, 25, 35, 0.9);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

  body {
    display: flex;
    height: 100vh;
    background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
    color: #e2e8f0;
    overflow: hidden;
  }

  /* Sidebar Toggle Logic */
  .sidebar {
    width: 280px;
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    padding: 25px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--glass-border);
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: absolute;
    height: 100%;
    transform: translateX(-100%); /* Start hidden */
  }

  .sidebar.active { transform: translateX(0); }

  /* Hamburger Menu Button */
  .menu-toggle {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 110;
    cursor: pointer;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 10px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: 0.3s;
  }

  .menu-toggle:hover { background: rgba(255,255,255,0.1); }

  .bar { width: 25px; height: 3px; background: var(--primary-glow); border-radius: 2px; }

  /* Welcome Background Text */
  #welcome-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 1;
    transition: 0.5s;
  }

  #welcome-bg h1 {
    font-size: 5rem;
    font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }

  .sidebar h2 { 
    font-size: 1.6rem; 
    margin-bottom: 30px; 
    background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .btn-sidebar {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 14px;
    color: #cbd5e1;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.3s;
    text-align: left;
  }

  .btn-sidebar:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(5px); }
  .new-chat-btn { background: linear-gradient(135deg, var(--secondary-glow), var(--primary-glow)); border: none; color: #0f172a; font-weight: 700; }

  /* Main Area */
  .main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }

  .chat-box {
    flex: 1;
    padding: 80px 40px; /* Space for menu button */
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 2;
  }

  .message {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.6;
    animation: fadeIn 0.4s ease-out;
    backdrop-filter: blur(10px);
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

  /* Input Container */
  .input-area { padding: 30px 40px; z-index: 5; }
  .input-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 8px 15px;
    backdrop-filter: blur(20px);
  }

  input { flex: 1; padding: 15px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
  .send-btn { background: var(--primary-glow); color: #0f172a; border-radius: 12px; padding: 10px 24px; font-weight: bold; border: none; cursor: pointer; }

  /* Dev Credit */
  .footer-credit { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; }
  .credit-pill { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 8px 20px; border-radius: 50px; font-size: 0.85rem; color: #94a3b8; }
  .credit-pill strong { color: var(--primary-glow); }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
  .modal-content { background: #171923; padding: 40px; border-radius: 24px; width: 380px; border: 1px solid var(--glass-border); text-align: center; }
  .modal-content input { display: block; width: 100%; margin: 20px 0; background: #0a0b10; border: 1px solid var(--glass-border); padding: 15px; border-radius: 10px; color: white; }
  .hidden { display: none !important; }
</style>
</head>

<body>

<div class="menu-toggle" onclick="toggleSidebar()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2>Access BOSS AI</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button class="send-btn" style="width:100%" onclick="login()">Initialize System</button>
    <p id="error" style="color:#f87171; margin-top:15px; display:none;">Identity Verification Failed</p>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2>BOSS AI</h2>
    <button style="background:transparent; border:none; color:white; cursor:pointer; font-size:1.5rem;" onclick="toggleSidebar()">✕</button>
  </div>
  <button class="btn-sidebar new-chat-btn" onclick="newChat()">+ New Session</button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">⚙️ Settings</button>
</div>

<div class="main">
  <div id="welcome-bg">
    <h1>Welcome to<br>BOSS AI</h1>
  </div>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Send a message..." onkeypress="handleKey(event)">
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="footer-credit">
    <div class="credit-pill">
      Developed with ❤️ by <strong>Bhupendra Saini</strong>
    </div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h2>API Configuration</h2>
    <input id="apiInput" type="password" placeholder="OpenRouter API Key">
    <button class="send-btn" style="width:100%; margin-bottom:10px;" onclick="saveAPI()">Save Key</button>
    <button class="btn-sidebar" style="width:100%; text-align:center;" onclick="toggleSettings(false)">Close</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
let currentUser = localStorage.getItem("user") || null;
let currentChat = [];

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('active');
}

function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (pass === "bhupi2026") {
    currentUser = user;
    localStorage.setItem("user", user);
    document.getElementById('loginPage').classList.add('hidden');
  } else {
    document.getElementById('error').style.display = "block";
  }
}

function newChat() {
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '';
  document.getElementById('welcome-bg').style.opacity = '1';
  toggleSidebar();
}

async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const message = inputEl.value.trim();
  if (!API_KEY) return toggleSettings(true);
  if (!message) return;

  // Hide Welcome Text on first message
  document.getElementById('welcome-bg').style.opacity = '0';

  addMessage(message, "user");
  inputEl.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerText = "...";
  document.getElementById('chatBox').appendChild(botMsg);

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({ role: m.sender === "user" ? "user" : "assistant", content: m.text }))
      })
    });
    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "API Error.";
    botMsg.innerText = "";
    typeText(botMsg, reply);
    currentChat.push({ text: reply, sender: "bot" });
  } catch (error) {
    botMsg.innerText = "System Failure.";
  }
}

function addMessage(text, sender) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
  }, 10);
}

function toggleSettings(show) {
  const panel = document.getElementById('settingsPanel');
  show ? panel.classList.remove('hidden') : panel.classList.add('hidden');
  if(show) toggleSidebar();
}

function saveAPI() {
  API_KEY = document.getElementById('apiInput').value;
  localStorage.setItem("api_key", API_KEY);
  toggleSettings(false);
}

window.onload = () => { if (currentUser) document.getElementById('loginPage').classList.add('hidden'); };
</script>

</body>
</html>
