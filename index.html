<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS AI | GPT-5.1 Elite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-glow: #00f2fe;
      --secondary-glow: #4facfe;
      --accent: #19c37d;
      --bg-dark: #0a0b10;
      --panel-bg: rgba(15, 17, 26, 0.98);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-msg: #2563eb;
      --bot-msg: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 300px;
      height: 100vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-top { flex: 1; overflow-y: auto; }
    .sidebar-bottom { border-top: 1px solid var(--glass-border); padding-top: 15px; margin-top: 10px; }

    @media (min-width: 1024px) {
      .sidebar { position: relative; transform: translateX(0) !important; }
      .menu-toggle { display: none !important; }
    }

    @media (max-width: 1023px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    }

    .btn-sidebar {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-sidebar:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-glow); }

    /* --- MAIN LAYOUT --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 80px 15px 10px 15px;
      display: flex;
      flex-direction: column;
      z-index: 2;
      scroll-behavior: smooth;
    }

    .message-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-bottom: 120px; 
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }

    /* --- FIXED INPUT SECTION --- */
    .bottom-wrapper {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      background: linear-gradient(transparent, var(--bg-dark) 40%);
      padding: 20px 15px 10px 15px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    @media (min-width: 1024px) {
      .bottom-wrapper { width: calc(100% - 300px); }
    }

    .input-container {
      max-width: 800px;
      width: 100%;
      display: flex;
      background: rgba(30, 32, 45, 0.95);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      padding: 6px 6px 6px 18px;
      backdrop-filter: blur(15px);
      margin-bottom: 8px;
      align-items: center;
      transition: border-color 0.3s;
    }

    .input-container:focus-within { border-color: var(--primary-glow); }

    input { flex: 1; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
    
    .send-btn {
      background: var(--primary-glow);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .send-btn:active { transform: scale(0.9); }

    .icon-btn-left, .icon-btn-right {
      cursor: pointer;
      display: flex;
      align-items: center;
      color: #64748b;
      transition: 0.2s;
    }
    .icon-btn-left { margin-right: 12px; }
    .icon-btn-right { margin-right: 8px; }
    .icon-btn-left:hover, .icon-btn-right:hover { color: var(--primary-glow); }

    .listening { color: #ff4b2b !important; animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .footer-credit {
      font-size: 0.6rem;
      color: #64748b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 5px;
    }

    .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
    .bar { width: 20px; height: 2px; background: var(--primary-glow); margin: 4px 0; }
    
    #welcome-bg { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 1; transition: 0.8s; z-index: 1; width: 100%; pointer-events: none; }
    #welcome-bg h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; background: linear-gradient(to bottom, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #111; padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid var(--glass-border); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .hidden { display: none !important; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  </style>
</head>
<body>

<div class="menu-toggle" onclick="toggleSidebar()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h1 style="margin-bottom: 10px; color: var(--primary-glow); letter-spacing: -1px;">BOSS AI</h1>
    <p style="color: #64748b; margin-bottom: 25px; font-size: 0.9rem;">Authentication Required</p>
    <input id="username" placeholder="Operator Name" style="width:100%; margin-bottom:12px; padding:14px; border-radius:12px; border:1px solid #333; background:#000; color:#fff; outline:none;">
    <input id="password" type="password" placeholder="Access Code" style="width:100%; margin-bottom:25px; padding:14px; border-radius:12px; border:1px solid #333; background:#000; color:#fff; outline:none;">
    <button class="btn-sidebar" style="background:var(--primary-glow); color:#000; width:100%; font-weight:800; justify-content:center; height: 50px;" onclick="login()">INITIALIZE SYSTEM</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <h2 style="color: var(--primary-glow); margin-bottom:30px; font-weight: 800; letter-spacing: -1px;">BOSS AI</h2>
    <button class="btn-sidebar" onclick="newChat()"><span>+</span> New Session</button>
    <button class="btn-sidebar"><span>🔍</span> History</button>
    <button class="btn-sidebar"><span>🖼️</span> Studio</button>
    <button class="btn-sidebar"><span>🧩</span> Extensions</button>
    <button class="btn-sidebar" style="border-color: var(--secondary-glow); color: var(--secondary-glow);"><span>🧪</span> Deep Research</button>
  </div>
  <div class="sidebar-bottom">
    <button class="btn-sidebar" onclick="toggleSettings(true)"><span>⚙️</span> Settings</button>
    <button class="btn-sidebar"><span>❓</span> Support</button>
    <p style="font-size: 0.7rem; color: #444; margin-top: 10px; text-align: center;">v2.0.4 Premium</p>
  </div>
</div>

<div class="main">
  <div id="welcome-bg">
    <h1>BOSS AI</h1>
    <p style="color:var(--secondary-glow); font-weight: 500; letter-spacing: 2px;">SECURE NEURAL INTERFACE</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message-container" id="messageContainer"></div>
  </div>

  <div class="bottom-wrapper">
    <div class="input-container">
      <label class="icon-btn-left" title="Upload Data">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <input type="file" id="fileInput" hidden>
      </label>

      <input id="userInput" placeholder="Type a command..." autocomplete="off">
      
      <div id="micBtn" class="icon-btn-right" onclick="toggleVoice()" title="Voice Command">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </div>

      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" style="width:18px; height:18px; fill:#000;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
    <div class="footer-credit">Developed by Bhupendra Saini</div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h3 style="color:#fff; margin-bottom:10px;">Configuration</h3>
    <p style="color: #64748b; font-size: 0.8rem; margin-bottom: 20px;">Enter your OpenRouter API Key</p>
    <input id="apiInput" type="password" placeholder="sk-or-v1-..." style="width:100%; margin-bottom:15px; padding:14px; border-radius:12px; background:#000; color:#fff; border:1px solid #333; outline:none;">
    <button class="btn-sidebar" style="background:var(--accent); color:#000; width:100%; justify-content:center; font-weight:bold;" onclick="saveAPI()">SAVE CONFIGURATION</button>
    <button class="btn-sidebar" style="color:#64748b; width:100%; border:none; background:transparent; justify-content:center;" onclick="toggleSettings(false)">Cancel</button>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem("api_key") || "";
  let currentUser = localStorage.getItem("user") || null;

  const chatBox = document.getElementById('chatBox');
  const messageContainer = document.getElementById('messageContainer');
  const userInput = document.getElementById('userInput');
  const welcomeBg = document.getElementById('welcome-bg');

  // FEATURE: EMOJI INTEGRATION + ELITE PERSONALITY
  const SYSTEM_PROMPT = `You are BOSS AI, an elite assistant powered by GPT-5.1. 
  1. Provide clear and extremely helpful answers. 
  2. ALWAYS use 2-4 relevant emojis in every reply to stay engaging and expressive. ✨🚀
  3. Maintain a high-tech "Elite Interface" vibe. 🤖
  4. Use bold text and bullet points for structured data. 📊
  5. If the user is casual, be witty. If they are technical, be precise.`;

  function login() {
    const pass = document.getElementById('password').value;
    const user = document.getElementById('username').value;
    if(pass === "bhupi2026") {
      currentUser = user || "Operator";
      localStorage.setItem("user", currentUser);
      document.getElementById('loginPage').classList.add('hidden');
      userInput.focus();
    } else {
      alert("Access Denied");
    }
  }

  // Voice Logic
  const micBtn = document.getElementById('micBtn');
  let isListening = false;
  const recognition = (window.SpeechRecognition || window.webkitSpeechRecognition) ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;

  if (recognition) {
    recognition.onstart = () => { isListening = true; micBtn.classList.add('listening'); };
    recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
    recognition.onend = () => { isListening = false; micBtn.classList.remove('listening'); };
  }

  function toggleVoice() {
    if(!recognition) return alert("Speech recognition not supported.");
    isListening ? recognition.stop() : recognition.start();
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
  function toggleSettings(show) { document.getElementById('settingsPanel').classList.toggle('hidden', !show); }
  function saveAPI() { 
    const v = document.getElementById('apiInput').value; 
    if(v){ API_KEY=v; localStorage.setItem("api_key", v); toggleSettings(false); } 
  }

  function newChat() {
    messageContainer.innerHTML = '';
    welcomeBg.style.opacity = '1';
    if(window.innerWidth < 1024) toggleSidebar();
    userInput.focus();
  }

  // UPDATED: OPENROUTER GPT-5.1 INTEGRATION
  async function sendMessage() {
    const text = userInput.value.trim();
    if(!text) return;
    if(!API_KEY) { toggleSettings(true); return; }

    welcomeBg.style.opacity = '0';
    addMessage(text, 'user');
    userInput.value = '';
    
    const botDiv = addMessage("Initializing GPT-5.1 Response...", 'bot');
    
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { 
          "Authorization": `Bearer ${API_KEY}`, 
          "Content-Type": "application/json",
          "HTTP-Referer": window.location.href, // Recommended for OpenRouter
          "X-Title": "BOSS AI" // Recommended for OpenRouter
        },
        body: JSON.stringify({ 
          model: "openai/gpt-5.1", // TARGET MODEL
          messages: [
            {role: "system", content: SYSTEM_PROMPT},
            {role: "user", content: text}
          ],
          temperature: 0.7
        })
      });
      
      const data = await res.json();
      
      if(data.error) {
          botDiv.textContent = `Error: ${data.error.message} ⚠️`;
          return;
      }

      const response = data.choices?.[0]?.message?.content || "System encountered an error. 📉";
      
      // Premium typing effect
      botDiv.textContent = "";
      let i = 0;
      const interval = setInterval(() => {
        if(i < response.length) {
          botDiv.textContent += response.charAt(i);
          i++;
          chatBox.scrollTo(0, chatBox.scrollHeight);
        } else {
          clearInterval(interval);
        }
      }, 10);

    } catch(e) { 
      botDiv.textContent = "Connectivity failure. Verify credentials. 📡"; 
    }
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.textContent = text;
    messageContainer.appendChild(div);
    chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    return div;
  }

  userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  window.onload = () => { if(currentUser) document.getElementById('loginPage').classList.add('hidden'); };
  document.getElementById('fileInput').onchange = function() { if(this.files.length) addMessage(`📎 File Linked: ${this.files[0].name}`, 'user'); };
</script>

</body>
</html>
