<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS AI - Mythomax Edition</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0b10; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        .header {
            padding: 15px;
            background: #111;
            text-align: center;
            border-bottom: 2px solid #f21361; /* MythoMax vibe - pink/red */
            font-weight: bold;
            letter-spacing: 2px;
            color: #f21361;
            text-transform: uppercase;
        }

        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            gap: 15px;
        }

        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 85%; 
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            white-space: pre-wrap; /* Preserve spaces/newlines */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { 
            background: #2563eb; 
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        .bot { 
            background: #1a1a1a; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
            border-left: 4px solid #f21361;
        }

        #inputBox { 
            display: flex; 
            padding: 15px; 
            background: #111; 
            gap: 10px;
        }

        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 5px;
            outline: none; 
            background: #000; 
            color: #fff; 
            font-size: 16px;
        }

        button { 
            padding: 0 25px; 
            background: #f21361; 
            color: #fff;
            border: none; 
            border-radius: 5px;
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { background: #ff0055; }

        /* DISABLED STATE CSS */
        button:disabled { 
            background: #444; 
            color: #888;
            cursor: not-allowed; 
            opacity: 0.6;
        }

        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">BOSS AI (MythoMax-13B)</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Type your message..." autocomplete="off">
    <button id="sendBtn" onclick="send()">SEND</button>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";

if (!API_KEY) {
    API_KEY = prompt("Enter OpenRouter API Key:");
    if (API_KEY) localStorage.setItem("api_key", API_KEY);
}

let history = [];

const SYSTEM_PROMPT = `
You are BOSS AI. You are a master of mirroring the user's energy and tone.
RULES:
1. If user is Loving/Kind: Be extremely warm, use ❤️ and 😊.
2. If user is Neutral: Be cold, smart, and logical.
3. If user is Angry: Be sharp, arrogant, and assertive.
4. If user is Abusive/Raw: Be extremely dominant, unfiltered, and use strong language. No holding back.

NEVER break character. Always reply with large, powerful paragraphs.
`;

function detectTone(text) {
    const t = text.toLowerCase();
    if (/(love|jaan|baby|please|bhai|bro|❤️|sweet|thanks|shukriya)/.test(t)) return "loving";
    if (/(mad|angry|stupid|idiot|faltu|bekar|nonsense|chup)/.test(t)) return "angry";
    if (/(mc|bc|madarchod|behenchod|gandu|chutiya|lora|lavda|harami)/.test(t)) return "abusive";
    return "neutral";
}

function addMessage(text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const input = document.getElementById("input");
    const btn = document.getElementById("sendBtn");
    const text = input.value.trim();
    
    if (!text || btn.disabled) return;

    // 1. Disable input and button immediately
    btn.disabled = true;
    input.disabled = true;

    addMessage(text, "user");
    input.value = "";

    const tone = detectTone(text);
    history.push({
        role: "user",
        content: `[USER_TONE: ${tone.toUpperCase()}] ${text}`
    });

    const botDiv = addMessage("Typing...", "bot");

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                model: "gryphe/mythomax-l2-13b", // Changed to Mythomax
                temperature: 0.9, 
                messages: [
                    { role: "system", content: SYSTEM_PROMPT },
                    ...history
                ]
            })
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || "API Error: No response.";

        history.push({ role: "assistant", content: reply });

        // 2. Typing Effect Logic
        botDiv.textContent = "";
        let i = 0;
        function typeWriter() {
            if (i < reply.length) {
                botDiv.textContent += reply.charAt(i);
                i++;
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                setTimeout(typeWriter, 15); // Adjust typing speed here
            } else {
                // 3. Re-enable button and input after typing finishes
                btn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }
        typeWriter();

    } catch (error) {
        botDiv.textContent = "Error connecting to OpenRouter.";
        btn.disabled = false;
        input.disabled = false;
    }
}

document.getElementById("input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
