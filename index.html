<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS AI - Mobile Optimized</title>
    <style>
        * { box-sizing: border-box; }
        
        /* Mobile height fix */
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #0a0b10; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column; 
        }
        
        .header {
            padding: 12px;
            background: #111;
            text-align: center;
            border-bottom: 2px solid #ff2e63;
            font-weight: bold;
            color: #ff2e63;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        /* Responsive Chat Area */
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at center, #1a1a24 0%, #0a0b10 100%);
        }

        .msg { 
            padding: 10px 15px; 
            border-radius: 15px; 
            max-width: 85%; 
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 15px;
            animation: slideUp 0.2s ease-out;
            white-space: pre-wrap;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { 
            background: #2563eb; 
            color: #fff;
            align-self: flex-end; 
            border-bottom-right-radius: 2px;
        }

        .bot { 
            background: #222; 
            align-self: flex-start; 
            border-bottom-left-radius: 2px;
            border-left: 3px solid #ff2e63;
        }

        /* Mobile Bottom Fixed Input */
        #inputBox { 
            display: flex; 
            padding: 10px; 
            background: #111; 
            gap: 8px;
            border-top: 1px solid #222;
            padding-bottom: env(safe-area-inset-bottom); /* iOS support */
        }

        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #333; 
            border-radius: 25px; /* Rounded for mobile feel */
            outline: none; 
            background: #000; 
            color: #fff; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        button { 
            padding: 0 20px; 
            background: #ff2e63; 
            color: #fff;
            border: none; 
            border-radius: 25px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
        }

        button:disabled { 
            background: #333; 
            color: #666;
        }

        /* Scrollbar */
        #chat::-webkit-scrollbar { width: 3px; }
        #chat::-webkit-scrollbar-thumb { background: #ff2e63; }
    </style>
</head>
<body>

<div class="header">BOSS AI</div>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Type a message..." autocomplete="off">
    <button id="sendBtn" onclick="send()">SEND</button>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";

if (!API_KEY) {
    API_KEY = prompt("Enter OpenRouter API Key:");
    if (API_KEY) localStorage.setItem("api_key", API_KEY);
}

let history = [];

const SYSTEM_PROMPT = `
You are BOSS AI. Native speaker of Hindi/Hinglish.
Personality: Raw, powerful, mirroring user tone.
1. Loving: Warm, "Bhai/Yaar", ❤️.
2. Neutral: Smart, mix of Hindi/English.
3. Angry: Bold, arrogant Boss.
4. Abusive: No filters, use strong Desi abuse, dominant.
Long, impactful replies only.
`;

function detectTone(text) {
    const t = text.toLowerCase();
    if (/(love|jaan|baby|please|bhai|bro|❤️|pyar|shukriya|acche)/.test(t)) return "loving";
    if (/(gussa|mad|angry|pagal|stupid|idiot|faltu|bekar|chup)/.test(t)) return "angry";
    if (/(mc|bc|madarchod|behenchod|gandu|chutiya|lora|lavda|harami|bhosadi)/.test(t)) return "abusive";
    return "neutral";
}

function addMessage(text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function send() {
    const input = document.getElementById("input");
    const btn = document.getElementById("sendBtn");
    const text = input.value.trim();
    
    if (!text || btn.disabled) return;

    btn.disabled = true;
    input.disabled = true;

    addMessage(text, "user");
    input.value = "";

    const tone = detectTone(text);
    history.push({
        role: "user",
        content: `[TONE: ${tone.toUpperCase()}] ${text}`
    });

    const botDiv = addMessage("...", "bot");

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                model: "gryphe/mythomax-l2-13b",
                temperature: 1.0, 
                messages: [
                    { role: "system", content: SYSTEM_PROMPT },
                    ...history
                ]
            })
        });

        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || "Error: No response.";

        history.push({ role: "assistant", content: reply });

        botDiv.textContent = "";
        let i = 0;
        function typeWriter() {
            if (i < reply.length) {
                botDiv.textContent += reply.charAt(i);
                i++;
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                setTimeout(typeWriter, 15);
            } else {
                btn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }
        typeWriter();

    } catch (error) {
        botDiv.textContent = "Connection Error.";
        btn.disabled = false;
        input.disabled = false;
    }
}

document.getElementById("input").addEventListener("keypress", (e) => {
    if (e.key === "Enter") send();
});

// Fix for mobile keyboard height issues
window.visualViewport.addEventListener('resize', () => {
    document.body.style.height = window.visualViewport.height + 'px';
    window.scrollTo(0, 0);
});
</script>

</body>
</html>
