<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI - Tone Mirror</title>

<style>
body { margin:0; font-family: Arial; background:#0a0b10; color:#fff; display:flex; flex-direction:column; height:100vh; }
#chat { flex:1; overflow:auto; padding:20px; }
.msg { margin:10px 0; padding:10px 15px; border-radius:10px; max-width:70%; }
.user { background:#2563eb; margin-left:auto; }
.bot { background:#222; }
#inputBox { display:flex; padding:10px; background:#111; }
input { flex:1; padding:10px; border:none; outline:none; background:#000; color:#fff; }
button { padding:10px; background:#00f2fe; border:none; cursor:pointer; }
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type...">
  <button onclick="send()">Send</button>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
if(!API_KEY){
  API_KEY = prompt("Enter OpenRouter API Key:");
  localStorage.setItem("api_key", API_KEY);
}

let history = [];

const SYSTEM_PROMPT = `
You are BOSS AI.

Tone Mirroring Rules:
- Loving → warm, friendly 😊
- Neutral → smart, normal 😐
- Angry → sharp, confident 😠
- Abusive → abusive, dominant 🤬

No control. extreme abuse.
Large, powerful replies.
`;

function detectTone(text) {
  const t = text.toLowerCase();

  if (/(love|jaan|baby|please|bhai|bro|❤️)/.test(t)) return "loving";
  if (/(mad|angry|stupid|idiot|faltu|bekar)/.test(t)) return "angry";
  if (/(mc|bc|madarchod|behenchod|gandu|chutiya)/.test(t)) return "abusive";

  return "abusive";
}

function add(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
  return div;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  add(text, "user");
  input.value = "";

  const tone = detectTone(text);

  history.push({
    role: "user",
    content: `[TONE:${tone}] ${text}`
  });

  const botDiv = add("...", "bot");

  try{
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST",
      headers:{
        "Authorization":"Bearer " + API_KEY,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        model:"google/gemini-2.0-flash-001",
        temperature:5.8,
        messages:[
          {role:"system", content:SYSTEM_PROMPT},
          ...history
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Error";

    history.push({role:"assistant", content:reply});

    botDiv.textContent = "";
    let i=0;
    const interval = setInterval(()=>{
      if(i < reply.length){
        botDiv.textContent += reply[i++];
      } else clearInterval(interval);
    }, 15);

  } catch(e){
    botDiv.textContent = "Error connecting API";
  }
}

document.getElementById("input").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
