<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS AI | Elite Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-glow: #00f2fe;
      --secondary-glow: #4facfe;
      --accent: #19c37d;
      --bg-dark: #0a0b10;
      --panel-bg: rgba(15, 17, 26, 0.98);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-msg: #2563eb;
      --bot-msg: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 300px;
      height: 100vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 1024px) {
      .sidebar { position: relative; transform: translateX(0) !important; }
      .menu-toggle { display: none !important; }
    }

    @media (max-width: 1023px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    }

    .btn-sidebar {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    /* --- MAIN LAYOUT --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* --- CHAT SCROLL AREA --- */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 80px 15px 10px 15px; /* Top padding for menu toggle */
      display: flex;
      flex-direction: column;
      z-index: 2;
      scroll-behavior: smooth;
    }

    .message-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      /* space for the input area height */
      padding-bottom: 120px; 
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 15px;
      font-size: 0.95rem;
      line-height: 1.4;
      animation: fadeIn 0.3s ease;
    }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid var(--glass-border); }

    /* --- FIXED INPUT SECTION --- */
    .bottom-wrapper {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      /* Dynamic width for desktop/mobile */
      background: linear-gradient(transparent, var(--bg-dark) 40%);
      padding: 20px 15px 10px 15px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    /* Desktop adjustment for sidebar */
    @media (min-width: 1024px) {
      .bottom-wrapper { width: calc(100% - 300px); }
    }

    .input-container {
      max-width: 800px;
      width: 100%;
      display: flex;
      background: rgba(30, 32, 45, 0.95);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      padding: 6px 6px 6px 18px;
      backdrop-filter: blur(15px);
      margin-bottom: 8px;
    }

    input { flex: 1; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
    
    .send-btn {
      background: var(--primary-glow);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-credit {
      font-size: 0.6rem;
      color: #64748b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* --- UTILS --- */
    .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); }
    .bar { width: 20px; height: 2px; background: var(--primary-glow); margin: 4px 0; }
    #welcome-bg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; opacity: 1; transition: 0.5s; z-index: 1; }
    #welcome-bg h1 { font-size: 3rem; background: linear-gradient(#fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #111; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid var(--glass-border); text-align: center; }
    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="menu-toggle" onclick="toggleSidebar()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2 style="margin-bottom: 20px; color: var(--primary-glow);">BOSS AI LOGIN</h2>
    <input id="username" placeholder="Username" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
    <input id="password" type="password" placeholder="Access Code" style="width:100%; margin-bottom:20px; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
    <button class="btn-sidebar" style="background:var(--primary-glow); color:#000; width:100%; font-weight:bold;" onclick="login()">ENTER SYSTEM</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <h2 style="color: var(--primary-glow); margin-bottom:30px;">BOSS AI</h2>
  <button class="btn-sidebar" style="color:#fff;" onclick="newChat()">+ New Session</button>
  <button class="btn-sidebar" style="color:#fff;" onclick="toggleSettings(true)">⚙️ API Settings</button>
</div>

<div class="main">
  <div id="welcome-bg">
    <h1>BOSS AI</h1>
    <p style="color:var(--secondary-glow)">Ready for Commands</p>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message-container" id="messageContainer"></div>
  </div>

  <div class="bottom-wrapper">
    <div class="input-container">
      <input id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" style="width:18px; height:18px; fill:#000;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
    <div class="footer-credit">Developed by Bhupendra Saini</div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h3 style="color:#fff; margin-bottom:15px;">API Key Required</h3>
    <input id="apiInput" type="password" placeholder="sk-or-v1-..." style="width:100%; margin-bottom:15px; padding:12px; border-radius:8px; background:#000; color:#fff; border:1px solid #333;">
    <button class="btn-sidebar" style="background:var(--accent); color:#000; width:100%;" onclick="saveAPI()">SAVE KEY</button>
    <button class="btn-sidebar" style="color:#fff; width:100%; border:none; background:transparent;" onclick="toggleSettings(false)">Close</button>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem("api_key") || "";
  let currentUser = localStorage.getItem("user") || null;
  let currentChat = [];

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
  function toggleSettings(show) { document.getElementById('settingsPanel').classList.toggle('hidden', !show); }
  function saveAPI() { const v = document.getElementById('apiInput').value; if(v){ API_KEY=v; localStorage.setItem("api_key", v); toggleSettings(false); } }

  function login() {
    const p = document.getElementById('password').value;
    if(p === "bhupi2026") {
      currentUser = document.getElementById('username').value;
      localStorage.setItem("user", currentUser);
      document.getElementById('loginPage').classList.add('hidden');
    } else { alert("Wrong Code"); }
  }

  function newChat() {
    document.getElementById('messageContainer').innerHTML = '';
    document.getElementById('welcome-bg').style.opacity = '1';
    currentChat = [];
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if(!text || !API_KEY) { if(!API_KEY) toggleSettings(true); return; }

    document.getElementById('welcome-bg').style.opacity = '0';
    addMessage(text, 'user');
    input.value = '';

    const botDiv = addMessage("Thinking...", 'bot');

    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "openai/gpt-3.5-turbo",
          messages: [{role: "user", content: text}]
        })
      });
      const data = await res.json();
      botDiv.textContent = data.choices[0].message.content;
    } catch(e) { botDiv.textContent = "Error connecting to AI."; }
    
    const cb = document.getElementById('chatBox');
    cb.scrollTop = cb.scrollHeight;
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.textContent = text;
    document.getElementById('messageContainer').appendChild(div);
    const cb = document.getElementById('chatBox');
    cb.scrollTop = cb.scrollHeight;
    return div;
  }

  window.onload = () => { if(currentUser) document.getElementById('loginPage').classList.add('hidden'); };
</script>

</body>
</html>
