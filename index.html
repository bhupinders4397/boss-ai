<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BOSS AI | Elite Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary-glow: #00f2fe;
  --secondary-glow: #4facfe;
  --accent: #19c37d;
  --bg-dark: #0a0b10;
  --panel-bg: rgba(15, 17, 26, 0.98);
  --glass-border: rgba(255, 255, 255, 0.1);
  --user-msg: #2563eb;
  --bot-msg: rgba(255, 255, 255, 0.08);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

body {
  height: 100vh;
  width: 100vw;
  background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
  color: #e2e8f0;
  overflow: hidden;
  display: flex;
}

/* =========================
   SIDEBAR (UPDATED)
========================= */
.sidebar {
  width: 260px;
  height: 100vh;
  background: var(--panel-bg);
  backdrop-filter: blur(20px);
  padding: 20px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--glass-border);
  z-index: 1000;

  position: fixed;
  top: 0;
  left: 0;

  transform: translateX(-100%);
  transition: transform 0.3s ease;
}

.sidebar.active {
  transform: translateX(0);
}

.sidebar-top { flex: 1; overflow-y: auto; }

.sidebar-bottom {
  border-top: 1px solid var(--glass-border);
  padding-top: 15px;
  margin-top: 10px;
}

/* Sidebar Buttons (smaller + cleaner like ChatGPT) */
.btn-sidebar {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--glass-border);
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  text-align: left;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-sidebar:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--primary-glow);
}

/* Close Button */
.close-sidebar {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
}

/* =========================
   MENU TOGGLE (UNCHANGED)
========================= */
.menu-toggle {
  position: fixed;
  top: 15px;
  left: 15px;
  z-index: 1100;
  cursor: pointer;
  background: #000;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
}
.bar {
  width: 20px;
  height: 2px;
  background: var(--primary-glow);
  margin: 4px 0;
}

/* =========================
   OVERLAY (NEW)
========================= */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 999;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
}

/* (KEEP YOUR EXISTING CSS BELOW EXACTLY SAME) */
</style>
</head>

<body>

<!-- MENU BUTTON -->
<div class="menu-toggle" onclick="toggleSidebar(true)">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="toggleSidebar(false)"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <button class="close-sidebar" onclick="toggleSidebar(false)">✕</button>

  <div class="sidebar-top">
    <h2 style="color: var(--primary-glow); margin-bottom:15px;">BOSS AI</h2>

    <button class="btn-sidebar"><span>+</span> New Session</button>
    <button class="btn-sidebar"><span>🔍</span> Search Chats</button>
    <button class="btn-sidebar"><span>🖼️</span> Images</button>
    <button class="btn-sidebar"><span>🧩</span> Apps</button>
    <button class="btn-sidebar"><span>🧪</span> Deep Research</button>
  </div>

  <div class="sidebar-bottom">
    <button class="btn-sidebar"><span>💳</span> Pricing</button>
    <button class="btn-sidebar"><span>⚙️</span> Settings</button>
    <button class="btn-sidebar"><span>❓</span> Help</button>
  </div>
</div>

<!-- KEEP YOUR FULL MAIN UI EXACTLY SAME BELOW -->
<!-- (DO NOT CHANGE CHAT, INPUT, LOGIN, JS etc.) -->

<script>
function toggleSidebar(show) {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  if (show) {
    sidebar.classList.add("active");
    overlay.classList.add("active");
  } else {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
  }
}
</script>

</body>
</html>
