<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOSS AI</title>
</head>
<body style="font-family: Arial; background:#111; color:white;">

<h2>BOSS AI</h2>

<div id="chatBox" style="height:300px; overflow-y:auto; border:1px solid #333; padding:10px; margin-bottom:10px;"></div>

<input id="userInput" placeholder="Type..." style="width:80%; padding:10px;">
<button onclick="sendMessage()">Send</button>

<script>
let API_KEY = localStorage.getItem("api_key") || "PASTE_YOUR_API_KEY_HERE";

// ✅ MEMORY (FIX)
let chatHistory = JSON.parse(localStorage.getItem("chat_history")) || [];

const SYSTEM_PROMPT = "You are a helpful AI assistant.";

const chatBox = document.getElementById("chatBox");
const userInput = document.getElementById("userInput");

function addMessage(text, sender){
  const div = document.createElement("div");
  div.style.margin = "5px 0";
  div.innerHTML = sender === "user" ? "<b>You:</b> " + text : "<b>AI:</b> " + text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

function newChat(){
  chatBox.innerHTML = "";
  chatHistory = [];
  localStorage.removeItem("chat_history");
}

async function sendMessage(){
  const text = userInput.value.trim();
  if(!text) return;

  addMessage(text, "user");

  // save user message
  chatHistory.push({ role: "user", content: text });

  // limit memory
  if(chatHistory.length > 20){
    chatHistory.shift();
  }

  localStorage.setItem("chat_history", JSON.stringify(chatHistory));

  userInput.value = "";

  const botDiv = addMessage("Thinking...", "bot");

  try{
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "google/gemini-2.0-flash-001",
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          ...chatHistory
        ]
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Error";

    // save bot reply
    chatHistory.push({ role: "assistant", content: reply });
    localStorage.setItem("chat_history", JSON.stringify(chatHistory));

    botDiv.innerHTML = "<b>AI:</b> " + reply;

  }catch(e){
    botDiv.innerHTML = "<b>AI:</b> Error connecting.";
  }
}

userInput.addEventListener("keypress", function(e){
  if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
