<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant Pro</title>

<style>
  /* Base Styles */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

  body {
    display: flex;
    height: 100vh;
    background: #343541;
    color: white;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: #202123;
    padding: 15px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #4d4d4f;
  }

  .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; color: #19c37d; }

  .btn-sidebar {
    background: transparent;
    border: 1px solid #4d4d4f;
    padding: 12px;
    color: white;
    margin-bottom: 10px;
    cursor: pointer;
    border-radius: 5px;
    text-align: left;
    transition: 0.2s;
  }

  .btn-sidebar:hover { background: #2a2b32; }
  .new-chat-btn { background: #3b82f6; border: none; }
  .new-chat-btn:hover { background: #2563eb; }

  /* Main Chat Area */
  .main { flex: 1; display: flex; flex-direction: column; position: relative; }

  .chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  /* Message Bubbles */
  .message {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap; /* Preserves line breaks from AI */
  }

  .user { 
    background: #2563eb; 
    align-self: flex-end; 
    border-bottom-right-radius: 2px;
  }

  .bot { 
    background: #444654; 
    align-self: flex-start; 
    border-bottom-left-radius: 2px; 
  }

  /* Input Area */
  .input-area {
    display: flex;
    padding: 20px;
    background: linear-gradient(transparent, #343541 20%);
    gap: 10px;
  }

  .input-container {
    flex: 1;
    display: flex;
    background: #40414f;
    border-radius: 10px;
    padding: 5px 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }

  input {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: white;
    outline: none;
    font-size: 1rem;
  }

  button {
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.3s;
  }

  .send { background: #19c37d; color: white; }
  .send:hover { background: #15a367; }
  .mic { background: #ef4444; margin-right: 5px; }

  /* Modals (Login & Settings) */
  .modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: #202123;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    border: 1px solid #4d4d4f;
  }

  .modal-content input {
    display: block;
    width: 100%;
    margin: 15px 0;
    background: #343541;
    border: 1px solid #4d4d4f;
    padding: 10px;
    border-radius: 5px;
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button class="send" style="width:100%" onclick="login()">Login</button>
    <p id="error" style="color:#ff4a4a; margin-top:10px; display:none;">Invalid credentials</p>
  </div>
</div>

<div class="sidebar">
  <h2>AI Pro v2026</h2>
  <button class="btn-sidebar new-chat-btn" onclick="newChat()">+ New Chat</button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">⚙️ Settings</button>
  <div id="history"></div>
</div>

<div class="main">
  <div class="chat-box" id="chatBox">
    <div class="message bot">Hello! How can I help you today?</div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Ask me anything..." onkeypress="handleKey(event)">
      <button class="mic" onclick="startListening()">🎤</button>
      <button class="send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h2>API Settings</h2>
    <p style="font-size: 0.8rem; color: #aaa;">Enter your OpenRouter API Key</p>
    <input id="apiInput" type="password" placeholder="sk-or-...">
    <button class="send" onclick="saveAPI()">Save Key</button>
    <button style="background:#444654; color:white;" onclick="toggleSettings(false)">Cancel</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
let currentUser = localStorage.getItem("user") || null;
let currentChat = [];

// --- INITIALIZATION ---
window.onload = () => {
  if (currentUser) {
    document.getElementById('loginPage').classList.add('hidden');
  }
};

function handleKey(e) {
  if (e.key === 'Enter') sendMessage();
}

// --- LOGIN LOGIC ---
function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  // Simple local check - In a real app, this should be server-side
  if (pass === "bhupi2026") {
    currentUser = user;
    localStorage.setItem("user", user);
    document.getElementById('loginPage').classList.add('hidden');
  } else {
    document.getElementById('error').style.display = "block";
  }
}

// --- CHAT LOGIC ---
function newChat() {
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '<div class="message bot">Started a new conversation.</div>';
}

function addMessage(text, sender) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const message = inputEl.value.trim();

  if (!API_KEY) {
    alert("Please set your API key in Settings first.");
    return toggleSettings(true);
  }
  if (!message) return;

  addMessage(message, "user");
  inputEl.value = "";

  // Create bot bubble with loading state
  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerText = "Typing...";
  document.getElementById('chatBox').appendChild(botMsg);

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({
          role: m.sender === "user" ? "user" : "assistant",
          content: m.text
        }))
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "Sorry, I encountered an error.";

    botMsg.innerText = "";
    typeText(botMsg, reply);
    speak(reply);
    currentChat.push({ text: reply, sender: "bot" });

  } catch (error) {
    botMsg.innerText = "Error: Could not connect to API.";
    console.error(error);
  }
}

// --- EFFECTS & VOICE ---
function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
  }, 10);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1.1;
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
  }
}

// Voice Recognition
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.onresult = (e) => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    sendMessage();
  };
  function startListening() { recognition.start(); }
} else {
  document.querySelector('.mic').style.display = "none";
}

// --- SETTINGS ---
function toggleSettings(show) {
  const panel = document.getElementById('settingsPanel');
  if (show) {
    panel.classList.remove('hidden');
    document.getElementById('apiInput').value = API_KEY;
  } else {
    panel.classList.add('hidden');
  }
}

function saveAPI() {
  const val = document.getElementById('apiInput').value;
  API_KEY = val;
  localStorage.setItem("api_key", val);
  toggleSettings(false);
}
</script>

</body>
</html>
