<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS AI | Elite Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-glow: #00f2fe;
      --secondary-glow: #4facfe;
      --accent: #19c37d;
      --bg-dark: #0a0b10;
      --panel-bg: rgba(15, 17, 26, 0.98);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-msg: #2563eb;
      --bot-msg: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 300px;
      height: 100vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-top { flex: 1; overflow-y: auto; }
    .sidebar-bottom { border-top: 1px solid var(--glass-border); padding-top: 15px; margin-top: 10px; }

    @media (max-width: 1023px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    }

    .btn-sidebar {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-sidebar:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--primary-glow); }
    .btn-sidebar:disabled { opacity: 0.5; cursor: not-allowed; }

    /* --- LOGIN MODAL ENHANCEMENTS --- */
    .login-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 8px; font-size: 0.8rem; background: transparent; border: 1px solid var(--glass-border); color: #fff; border-radius: 5px; cursor: pointer; }
    .tab-btn.active { background: var(--primary-glow); color: #000; font-weight: bold; }
    
    .gmail-btn { background: #fff !important; color: #000 !important; font-weight: bold; border: none; margin-bottom: 15px; }

    /* --- MAIN AREA --- */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; overflow: hidden; }
    .chat-box { flex: 1; overflow-y: auto; padding: 80px 15px 10px 15px; display: flex; flex-direction: column; z-index: 2; }
    .message-container { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }

    .bottom-wrapper {
      position: fixed; bottom: 0; right: 0; width: 100%; 
      background: linear-gradient(transparent, var(--bg-dark) 40%);
      padding: 20px 15px 10px 15px; z-index: 10; display: flex; flex-direction: column; align-items: center;
    }
    @media (min-width: 1024px) { .bottom-wrapper { width: calc(100% - 300px); } }

    .input-container { max-width: 800px; width: 100%; display: flex; background: rgba(30,32,45,0.95); border: 1px solid var(--glass-border); border-radius: 25px; padding: 6px 6px 6px 18px; backdrop-filter: blur(15px); }
    input { flex: 1; border: none; background: transparent; color: white; outline: none; }
    
    .menu-toggle { position: fixed; top: 15px; left: 15px; z-index: 1100; cursor: pointer; background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--glass-border); }
    .bar { width: 20px; height: 2px; background: var(--primary-glow); margin: 4px 0; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #111; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--glass-border); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="menu-toggle" onclick="toggleSidebar()">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2 style="margin-bottom: 20px; color: var(--primary-glow); text-align: center;">BOSS AI ACCESS</h2>
    
    <div class="login-tabs">
      <button class="tab-btn active" id="userTab" onclick="switchTab('user')">User</button>
      <button class="tab-btn" id="adminTab" onclick="switchTab('admin')">Admin</button>
    </div>

    <div id="userSection">
      <button class="btn-sidebar gmail-btn" onclick="mockGmailLogin()">
        <img src="https://www.google.com/favicon.ico" width="16"> Continue with Gmail
      </button>
      <div style="text-align: center; margin: 10px; font-size: 0.7rem; color: #555;">OR EMAIL</div>
      <input id="userEmail" placeholder="Email Address" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
      <button class="btn-sidebar" style="background:var(--primary-glow); color:#000; width:100%; font-weight:bold; justify-content:center;" onclick="login('user')">LOGIN VIA EMAIL</button>
    </div>

    <div id="adminSection" class="hidden">
      <input id="adminUser" placeholder="Admin Username" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
      <input id="adminPass" type="password" placeholder="Admin Hash Code" style="width:100%; margin-bottom:20px; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
      <button class="btn-sidebar" style="background:var(--accent); color:#000; width:100%; font-weight:bold; justify-content:center;" onclick="login('admin')">VERIFY ADMIN</button>
    </div>

    <div style="margin-top: 15px; text-align: center;">
      <a href="#" onclick="stayLoggedOut()" style="color: #666; font-size: 0.8rem; text-decoration: none;">Continue as Guest (Stay Logged Out)</a>
    </div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <h2 style="color: var(--primary-glow); margin-bottom:10px;">BOSS AI</h2>
    <div id="userBadge" style="font-size: 0.7rem; margin-bottom: 20px; color: #888;"></div>
    
    <button class="btn-sidebar auth-req" onclick="newChat()"><span>+</span> New Session</button>
    <button class="btn-sidebar auth-req"><span>🔍</span> Search Chats</button>
    <button class="btn-sidebar auth-req"><span>🖼️</span> Images</button>
    <button class="btn-sidebar auth-req"><span>🧩</span> Apps</button>
    <button class="btn-sidebar auth-req" style="border-color: var(--secondary-glow);"><span>🧪</span> Deep Research</button>
  </div>

  <div class="sidebar-bottom">
    <button class="btn-sidebar"><span>💳</span> Plans & Pricing</button>
    <button class="btn-sidebar" onclick="toggleSettings(true)"><span>⚙️</span> Settings</button>
    <button class="btn-sidebar" onclick="logout()"><span>🚪</span> Logout</button>
  </div>
</div>

<div class="main">
  <div id="welcome-bg">
    <h1>BOSS AI</h1>
    <p id="statusMsg" style="color:var(--secondary-glow)">Please Login to Begin</p>
  </div>
  <div class="chat-box" id="chatBox"><div class="message-container" id="messageContainer"></div></div>

  <div class="bottom-wrapper">
    <div class="input-container">
      <input id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24" style="width:18px; height:18px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg></button>
    </div>
    <div class="footer-credit">Developed by Bhupendra Saini</div>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem("api_key") || "";
  let currentUser = localStorage.getItem("user") || null;
  let isGuest = false;

  function switchTab(type) {
    document.getElementById('userSection').classList.toggle('hidden', type === 'admin');
    document.getElementById('adminSection').classList.toggle('hidden', type === 'user');
    document.getElementById('userTab').classList.toggle('active', type === 'user');
    document.getElementById('adminTab').classList.toggle('active', type === 'admin');
  }

  function mockGmailLogin() {
    alert("Gmail Redirect: In a real app, this would open Google OAuth. Logging you in as 'Gmail User' for demo.");
    completeLogin("Gmail_User");
  }

  function stayLoggedOut() {
    isGuest = true;
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('statusMsg').innerText = "Guest Mode - Limited Access";
    document.querySelectorAll('.auth-req').forEach(btn => btn.disabled = true);
  }

  function login(type) {
    if(type === 'admin') {
      const pass = document.getElementById('adminPass').value;
      const user = document.getElementById('adminUser').value;
      if(pass === "bhupi2026") {
        completeLogin("ADMIN: " + (user || "Bhupendra"));
      } else { alert("Access Denied: Invalid Hash"); }
    } else {
      const email = document.getElementById('userEmail').value;
      if(email.includes('@')) {
        completeLogin(email);
      } else { alert("Please enter a valid email"); }
    }
  }

  function completeLogin(name) {
    currentUser = name;
    localStorage.setItem("user", name);
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('userBadge').innerText = "Active: " + name;
    document.getElementById('statusMsg').innerText = "System Ready";
    document.querySelectorAll('.auth-req').forEach(btn => btn.disabled = false);
  }

  function logout() {
    localStorage.removeItem("user");
    location.reload();
  }

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
  function toggleSettings(show) { if(!isGuest) document.getElementById('settingsPanel')?.classList.toggle('hidden', !show); else alert("Login required for settings");}

  window.onload = () => { 
    if(currentUser) completeLogin(currentUser); 
  };
  
  // Existing Chat Logic (sendMessage, addMessage, etc) would go here
</script>
</body>
</html>
