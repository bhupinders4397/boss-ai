<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS AI | Elite Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-glow: #00f2fe;
      --secondary-glow: #4facfe;
      --accent: #19c37d;
      --bg-dark: #0a0b10;
      --panel-bg: rgba(15, 17, 26, 0.98);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-msg: #2563eb;
      --bot-msg: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    /* --- ADMIN LOGIN PAGE --- */
    #adminLogin {
      position: fixed;
      inset: 0;
      background: #050507;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: #0f111a;
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--glass-border);
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .login-card h1 {
      color: var(--primary-glow);
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .login-card p {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .login-input {
      width: 100%;
      background: #000;
      border: 1px solid #222;
      padding: 14px 18px;
      border-radius: 12px;
      color: white;
      margin-bottom: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-input:focus { border-color: var(--primary-glow); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary-glow);
      color: #000;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .login-btn:active { transform: scale(0.98); }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 300px;
      height: 100vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      z-index: 1200;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .close-sidebar {
      cursor: pointer;
      color: #64748b;
      transition: 0.2s;
      display: flex;
    }

    .close-sidebar:hover { color: #ff4b2b; }

    .sidebar-top { flex: 1; overflow-y: auto; }

    @media (max-width: 1023px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
    }

    @media (min-width: 1024px) {
      .menu-toggle, .close-sidebar { display: none !important; }
    }

    /* --- BRAIN TRIGGER --- */
    .menu-toggle { 
      position: fixed; 
      top: 15px; 
      left: 15px; 
      z-index: 1100; 
      cursor: pointer; 
      background: rgba(15, 17, 26, 0.8); 
      padding: 10px; 
      border-radius: 12px; 
      border: 1px solid var(--glass-border); 
      display: flex;
    }

    .sidebar.active ~ .main .menu-toggle { opacity: 0; pointer-events: none; }

    .brain-svg { fill: var(--primary-glow); }

    /* --- MAIN UI --- */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
    
    .chat-box { flex: 1; overflow-y: auto; padding: 80px 15px 120px 15px; }

    .message-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

    .message { max-width: 85%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

    .input-wrapper { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; display: flex; gap: 10px; background: rgba(30, 32, 45, 0.95); padding: 8px; border-radius: 20px; border: 1px solid var(--glass-border); }
    
    @media (min-width: 1024px) {
        .input-wrapper { left: calc(50% + 150px); }
    }

    input#userInput { flex: 1; background: transparent; border: none; color: white; outline: none; padding-left: 15px; }

    .send-btn { background: var(--primary-glow); border: none; padding: 10px; border-radius: 15px; cursor: pointer; }

    .btn-sidebar { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; border-radius: 12px; cursor: pointer; text-align: left; }

    #welcome-bg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="adminLogin">
  <div class="login-card">
    <h1>BOSS AI</h1>
    <p>SECURE TERMINAL ACCESS</p>
    <input type="text" id="adminUser" class="login-input" placeholder="Admin Username">
    <input type="password" id="adminPass" class="login-input" placeholder="Access Code">
    <button class="login-btn" onclick="validateAdmin()">AUTHENTICATE</button>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2 style="color: var(--primary-glow); font-weight: 800;">BOSS AI</h2>
    <div class="close-sidebar" onclick="toggleSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
  </div>
  <div class="sidebar-top">
    <button class="btn-sidebar" onclick="location.reload()">+ New Session</button>
    <button class="btn-sidebar">🔍 History</button>
    <button class="btn-sidebar" onclick="logout()">🔓 Logout Admin</button>
  </div>
</div>

<div class="main">
  <div class="menu-toggle" onclick="toggleSidebar()">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <path class="brain-svg" d="M12 21.5c.3 0 .5-.2.5-.5v-7.5c1.4-.2 2.5-1.4 2.5-2.9 0-1.6-1.3-2.9-2.9-2.9h-.1V4c0-1.1-.9-2-2-2S8 2.9 8 4v3.7h-.1C6.3 7.7 5 9 5 10.6c0 1.5 1.1 2.7 2.5 2.9V21c0 .3.2.5.5.5h4z" />
      <path class="brain-svg" opacity="0.4" d="M17.5 11c0-2.5-2-4.5-4.5-4.5V5c3.3 0 6 2.7 6 6s-2.7 6-6 6v-1.5c2.5 0 4.5-2 4.5-4.5zM6.5 11c0-2.5 2-4.5 4.5-4.5V5c-3.3 0-6 2.7-6 6s2.7 6 6 6v-1.5c-2.5 0-4.5-2-4.5-4.5z" />
    </svg>
  </div>

  <div id="welcome-bg">
    <h1 style="font-size: 3rem; font-weight: 800; opacity: 0.2;">BOSS AI</h1>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message-container" id="messageContainer"></div>
  </div>

  <div class="input-wrapper">
    <input id="userInput" placeholder="Ask anything..." autocomplete="off">
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="#000"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
  </div>
</div>

<script>
  // ADMIN LOGIC
  function validateAdmin() {
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;

    if(user === "bhupi2026" && pass === "bhupi2026") {
      document.getElementById('adminLogin').style.display = 'none';
      localStorage.setItem("boss_admin", "true");
    } else {
      alert("Invalid Operator Credentials");
    }
  }

  function logout() {
    localStorage.removeItem("boss_admin");
    location.reload();
  }

  // Check login on load
  window.onload = () => {
    if(localStorage.getItem("boss_admin") === "true") {
      document.getElementById('adminLogin').style.display = 'none';
    }
  };

  // UI LOGIC
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
  }

  function sendMsg() {
    const input = document.getElementById('userInput');
    const container = document.getElementById('messageContainer');
    if(!input.value.trim()) return;

    document.getElementById('welcome-bg').style.display = 'none';
    
    const userDiv = document.createElement('div');
    userDiv.className = 'message user';
    userDiv.textContent = input.value;
    container.appendChild(userDiv);
    
    input.value = '';
    document.getElementById('chatBox').scrollTo(0, 9999);
  }

  document.getElementById('userInput').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') sendMsg();
  });
</script>

</body>
</html>
