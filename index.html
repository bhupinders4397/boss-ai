<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Assistant Pro</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
  display:flex;
  height:100vh;
  background:#343541;
  color:white;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:#202123;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.new-chat {
  background:#3b82f6;
  padding:10px;
  border:none;
  color:white;
  margin-bottom:10px;
  cursor:pointer;
}

/* Chat */
.main { flex:1; display:flex; flex-direction:column; }

.chat-box {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.message {
  margin:10px 0;
  max-width:70%;
  padding:12px;
  border-radius:10px;
}

.user { background:#2563eb; align-self:flex-end; }
.bot { background:#444654; }

/* Input */
.input-area {
  display:flex;
  padding:10px;
  background:#40414f;
}

input {
  flex:1;
  padding:10px;
  border:none;
  background:#343541;
  color:white;
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  color:white;
}

.send { background:#19c37d; }
.mic { background:#ef4444; }

/* Login */
.login {
  position:absolute;
  width:100%;
  height:100%;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#202123;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.login input {
  display:block;
  margin:10px 0;
  width:200px;
}

/* Settings */
#settingsPanel {
  display:none;
  position:absolute;
  width:100%;
  height:100%;
  background:#000000cc;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Enter</button>
    <p id="error" style="color:red; display:none;">Wrong password!</p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button class="new-chat" onclick="openSettings()">⚙️ Settings</button>
  <button class="new-chat" onclick="newChat()">+ New Chat</button>
  <div id="history"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="chat-box" id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Type or speak...">
    <button class="mic" onclick="startListening()">🎤</button>
    <button class="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
  <div style="background:#202123;padding:20px;border-radius:10px;text-align:center;">
    <h2>Settings</h2>
    <input id="apiInput" placeholder="API Key" style="padding:10px;width:250px;">
    <br><br>
    <button onclick="saveAPI()">Save</button>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";

let currentUser = null;
let chats = [];
let currentChat = [];

// LOGIN
function login() {
  const user = username.value;
  const pass = password.value;

  if (pass !== "bhupi2026") {
    error.style.display = "block";
    return;
  }

  currentUser = user;
  localStorage.setItem("user", user);
  loadChats();
  loginPage.style.display = "none";
}

// CHAT HISTORY
function loadChats() {
  chats = JSON.parse(localStorage.getItem(currentUser)) || [];
}

function newChat() {
  currentChat = [];
  chatBox.innerHTML = "";
}

function saveChat() {
  chats.push(currentChat);
  localStorage.setItem(currentUser, JSON.stringify(chats));
}

// ADD MESSAGE
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

// 🎤 VOICE INPUT
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

function startListening() {
  recognition.start();
}

recognition.onresult = (e) => {
  userInput.value = e.results[0][0].transcript;
  sendMessage();
};

// 🔊 VOICE OUTPUT
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

// ⚡ STREAMING EFFECT
function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) clearInterval(interval);
  }, 15);
}

// SEND MESSAGE
async function sendMessage() {
  if (!API_KEY) return alert("Set API key in Settings");

  const message = userInput.value.trim();
  if (!message) return;

  addMessage(message, "user");
  userInput.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  chatBox.appendChild(botMsg);

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model:"openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({
          role: m.sender==="user"?"user":"assistant",
          content:m.text
        }))
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Error";

    // typing effect
    typeText(botMsg, reply);

    // voice
    speak(reply);

    currentChat.push({ text: reply, sender: "bot" });
    saveChat();

  } catch {
    botMsg.innerText = "Error";
  }
}

// SETTINGS
function openSettings() {
  settingsPanel.style.display = "flex";
  apiInput.value = API_KEY;
}

function closeSettings() {
  settingsPanel.style.display = "none";
}

function saveAPI() {
  API_KEY = apiInput.value;
  localStorage.setItem("api_key", API_KEY);
  alert("Saved!");
  closeSettings();
}

// AUTO LOGIN
window.onload = () => {
  const user = localStorage.getItem("user");
  if (user) {
    currentUser = user;
    loadChats();
    loginPage.style.display = "none";
  }
};
</script>

</body>
</html>
