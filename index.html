<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI | Next Gen</title>

<style>
  :root {
    --primary: #00f2fe;
    --secondary: #4facfe;
    --bg-dark: #0f172a;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #19c37d;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif; }

  body {
    height: 100vh;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    color: white;
    overflow: hidden;
    display: flex;
  }

  /* Animated Background Mesh */
  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.15) 0%, transparent 50%);
    z-index: -1;
    animation: drift 15s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
  }

  /* Sidebar with Glassmorphism */
  .sidebar {
    width: 280px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    padding: 25px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--glass-border);
    animation: slideInLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .sidebar h2 { 
    font-size: 1.8rem; 
    margin-bottom: 30px; 
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .btn-sidebar {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 14px;
    color: white;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-sidebar:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
    border-color: var(--primary);
  }

  .new-chat-btn {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
    border: none;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
  }

  /* Main Area */
  .main { flex: 1; display: flex; flex-direction: column; position: relative; }

  .chat-box {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* Enhanced Message Bubbles */
  .message {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.6;
    font-size: 0.95rem;
    position: relative;
    animation: fadeInMessage 0.4s ease forwards;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  @keyframes fadeInMessage {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user { 
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
    align-self: flex-end; 
    border-bottom-right-radius: 4px;
    color: white;
  }

  .bot { 
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    align-self: flex-start; 
    border-bottom-left-radius: 4px; 
  }

  /* Modern Input Area */
  .input-area {
    padding: 30px;
    background: linear-gradient(transparent, var(--bg-dark));
  }

  .input-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 8px 15px;
    border: 1px solid var(--glass-border);
    transition: border-color 0.3s;
  }

  .input-container:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
  }

  input {
    flex: 1;
    padding: 15px;
    border: none;
    background: transparent;
    color: white;
    outline: none;
    font-size: 1rem;
  }

  .btn-icon {
    background: transparent;
    color: white;
    font-size: 1.2rem;
    padding: 10px;
    border-radius: 12px;
    transition: 0.2s;
  }

  .btn-icon:hover { background: var(--glass); color: var(--primary); }

  .send-active { color: var(--primary) !important; }

  /* Modals & Login */
  .modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: #1e293b;
    padding: 40px;
    border-radius: 24px;
    text-align: center;
    width: 400px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: zoomIn 0.5s ease;
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .hidden { display: none !important; }

  /* Typing Animation */
  .typing-dot {
    width: 6px; height: 6px; background: #94a3b8;
    border-radius: 50%; display: inline-block;
    margin: 0 2px; animation: bounce 1.4s infinite;
  }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

</style>
</head>

<body>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2 style="margin-bottom:10px; font-size:2rem;">Welcome Back</h2>
    <p style="color:#94a3b8; margin-bottom:25px;">Please log in to BOSS AI</p>
    <input id="username" placeholder="Username" style="background:#0f172a; border-radius:10px; margin-bottom:15px; border:1px solid #334155; width:100%;">
    <input id="password" type="password" placeholder="Password" style="background:#0f172a; border-radius:10px; margin-bottom:25px; border:1px solid #334155; width:100%;">
    <button class="new-chat-btn" style="width:100%; padding:15px; border-radius:12px; cursor:pointer; color:white;" onclick="login()">Initialize System</button>
    <p id="error" style="color:#f87171; margin-top:15px; display:none; font-size:0.9rem;">Access Key Incorrect</p>
  </div>
</div>

<div class="sidebar">
  <h2>BOSS AI</h2>
  <button class="btn-sidebar new-chat-btn" onclick="newChat()">
    <span>+</span> New Session
  </button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">
    <span>⚙️</span> Settings
  </button>
  <div id="history" style="flex:1"></div>
  
  <div style="font-size:0.8rem; color:#64748b; text-align:center;">
    v2.0.26 Stable Release
  </div>
</div>

<div class="main">
  <div class="chat-box" id="chatBox">
    <div class="message bot">System online. Hello Bhupendra, I am ready to process your requests.</div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Ask me anything..." onkeypress="handleKey(event)" oninput="toggleIconColor()">
      <button class="btn-icon" onclick="startListening()">🎤</button>
      <button class="btn-icon" onclick="sendMessage()" id="sendBtn">✦</button>
    </div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h3>Configure API</h3>
    <p style="font-size:0.85rem; color:#94a3b8; margin:10px 0;">Your keys are stored locally on this browser.</p>
    <input id="apiInput" type="password" placeholder="OpenRouter API Key" style="background:#0f172a; border-radius:10px; margin-bottom:20px; border:1px solid #334155; width:100%;">
    <div style="display:flex; gap:10px;">
        <button class="new-chat-btn" style="flex:1; padding:12px; cursor:pointer;" onclick="saveAPI()">Save Key</button>
        <button style="background:#334155; border:none; color:white; flex:1; border-radius:12px; cursor:pointer;" onclick="toggleSettings(false)">Cancel</button>
    </div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
let currentUser = localStorage.getItem("user") || null;
let currentChat = [];

window.onload = () => {
  if (currentUser) document.getElementById('loginPage').classList.add('hidden');
};

function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

function toggleIconColor() {
    const input = document.getElementById('userInput').value;
    document.getElementById('sendBtn').classList.toggle('send-active', input.length > 0);
}

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (pass === "bhupi2026") {
    currentUser = user;
    localStorage.setItem("user", user);
    document.getElementById('loginPage').style.opacity = '0';
    setTimeout(() => document.getElementById('loginPage').classList.add('hidden'), 500);
  } else {
    document.getElementById('error').style.display = "block";
  }
}

function newChat() {
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '<div class="message bot">New secure session established.</div>';
}

function addMessage(text, sender) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const message = inputEl.value.trim();
  if (!API_KEY) return toggleSettings(true);
  if (!message) return;

  addMessage(message, "user");
  inputEl.value = "";
  toggleIconColor();

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  document.getElementById('chatBox').appendChild(botMsg);
  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({
          role: m.sender === "user" ? "user" : "assistant",
          content: m.text
        }))
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "Connection timeout.";

    botMsg.innerText = "";
    typeText(botMsg, reply);
    speak(reply);
    currentChat.push({ text: reply, sender: "bot" });
  } catch (error) {
    botMsg.innerText = "Critical System Error.";
  }
}

function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
  }, 15);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1.1;
    window.speechSynthesis.speak(speech);
  }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.onresult = (e) => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    sendMessage();
  };
  function startListening() { recognition.start(); }
} else {
  document.querySelector('.mic').style.display = "none";
}

function toggleSettings(show) {
  const panel = document.getElementById('settingsPanel');
  show ? panel.classList.remove('hidden') : panel.classList.add('hidden');
}

function saveAPI() {
  API_KEY = document.getElementById('apiInput').value;
  localStorage.setItem("api_key", API_KEY);
  toggleSettings(false);
}
</script>

</body>
</html>
