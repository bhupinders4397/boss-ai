<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI | Elite Interface</title>

<style>
  :root {
    --primary-glow: #00f2fe;
    --secondary-glow: #4facfe;
    --accent: #19c37d;
    --bg-dark: #0a0b10;
    --panel-bg: rgba(23, 25, 35, 0.8);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  /* Base Reset & Animations */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }

  @keyframes backgroundDrift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  body {
    display: flex;
    height: 100vh;
    background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
    color: #e2e8f0;
    overflow: hidden;
  }

  /* Animated Background Mesh */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    pointer-events: none;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: var(--panel-bg);
    backdrop-filter: blur(15px);
    padding: 25px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--glass-border);
    z-index: 10;
  }

  .sidebar h2 { 
    font-size: 1.6rem; 
    margin-bottom: 30px; 
    background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .btn-sidebar {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 14px;
    color: #cbd5e1;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: left;
  }

  .btn-sidebar:hover { 
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--primary-glow);
    transform: translateX(5px);
  }

  .new-chat-btn { 
    background: linear-gradient(135deg, var(--secondary-glow), var(--primary-glow)); 
    border: none; 
    color: #0f172a;
    font-weight: 700;
  }

  .new-chat-btn:hover {
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
    transform: scale(1.02);
  }

  /* Main Chat Area */
  .main { flex: 1; display: flex; flex-direction: column; position: relative; }

  .chat-box {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  /* Message Bubbles */
  .message {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.6;
    animation: fadeIn 0.4s ease-out;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .user { 
    background: linear-gradient(135deg, #3b82f6, #2563eb); 
    align-self: flex-end; 
    border-bottom-right-radius: 4px;
    color: white;
  }

  .bot { 
    background: rgba(255, 255, 255, 0.05); 
    align-self: flex-start; 
    border-bottom-left-radius: 4px;
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(5px);
  }

  /* Input Area */
  .input-area {
    padding: 30px 40px;
    background: linear-gradient(transparent, var(--bg-dark));
  }

  .input-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 8px 15px;
    transition: 0.3s;
  }

  .input-container:focus-within {
    border-color: var(--primary-glow);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 25px rgba(0, 242, 254, 0.15);
  }

  input {
    flex: 1;
    padding: 15px;
    border: none;
    background: transparent;
    color: white;
    outline: none;
    font-size: 1rem;
  }

  .btn-icon {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 10px;
    color: #94a3b8;
    transition: 0.2s;
  }

  .btn-icon:hover { color: var(--primary-glow); }

  .send-btn { 
    background: var(--primary-glow); 
    color: #0f172a; 
    border-radius: 12px;
    padding: 10px 24px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-left: 10px;
  }

  /* Centered Footer */
  .footer-credit {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    pointer-events: none;
  }

  .credit-pill {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.85rem;
    color: #94a3b8;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .credit-pill strong { color: var(--primary-glow); }

  /* Modals */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    transition: 0.3s;
  }

  .modal-content {
    background: #171923;
    padding: 40px;
    border-radius: 24px;
    text-align: center;
    width: 380px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .modal-content input {
    display: block;
    width: 100%;
    margin: 20px 0;
    background: #0a0b10;
    border: 1px solid var(--glass-border);
    padding: 15px;
    border-radius: 10px;
    color: white;
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2>Access BOSS AI</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button class="send-btn" style="width:100%; margin:0;" onclick="login()">Initialize System</button>
    <p id="error" style="color:#f87171; margin-top:15px; display:none;">Identity Verification Failed</p>
  </div>
</div>

<div class="sidebar">
  <h2>BOSS AI</h2>
  <button class="btn-sidebar new-chat-btn" onclick="newChat()">+ New Session</button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">⚙️ Settings</button>
  <div id="history"></div>
</div>

<div class="main">
  <div class="chat-box" id="chatBox">
    <div class="message bot">System online. Hello Bhupendra, how can I assist you today?</div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)">
      <button class="btn-icon" onclick="startListening()">🎤</button>
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div class="footer-credit">
    <div class="credit-pill">
      Developed with ❤️ by <strong>Bhupendra Saini</strong>
    </div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h2>API Configuration</h2>
    <input id="apiInput" type="password" placeholder="OpenRouter API Key">
    <button class="send-btn" style="width:100%; margin-bottom:10px;" onclick="saveAPI()">Save Credentials</button>
    <button class="btn-sidebar" style="width:100%; text-align:center;" onclick="toggleSettings(false)">Close</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
let currentUser = localStorage.getItem("user") || null;
let currentChat = [];

window.onload = () => {
  if (currentUser) {
    document.getElementById('loginPage').classList.add('hidden');
  }
};

function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (pass === "bhupi2026") {
    currentUser = user;
    localStorage.setItem("user", user);
    document.getElementById('loginPage').classList.add('hidden');
  } else {
    document.getElementById('error').style.display = "block";
  }
}

function newChat() {
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '<div class="message bot">New session started.</div>';
}

function addMessage(text, sender) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const message = inputEl.value.trim();
  if (!API_KEY) return toggleSettings(true);
  if (!message) return;

  addMessage(message, "user");
  inputEl.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerText = "Processing...";
  document.getElementById('chatBox').appendChild(botMsg);
  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({
          role: m.sender === "user" ? "user" : "assistant",
          content: m.text
        }))
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "Connection error.";

    botMsg.innerText = "";
    typeText(botMsg, reply);
    speak(reply);
    currentChat.push({ text: reply, sender: "bot" });
  } catch (error) {
    botMsg.innerText = "System Failure. Check connection.";
  }
}

function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
  }, 10);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1.1;
    window.speechSynthesis.speak(speech);
  }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.onresult = (e) => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    sendMessage();
  };
  function startListening() { recognition.start(); }
} else {
  document.querySelector('.btn-icon').style.display = "none";
}

function toggleSettings(show) {
  const panel = document.getElementById('settingsPanel');
  if (show) {
    panel.classList.remove('hidden');
    document.getElementById('apiInput').value = API_KEY;
  } else {
    panel.classList.add('hidden');
  }
}

function saveAPI() {
  API_KEY = document.getElementById('apiInput').value;
  localStorage.setItem("api_key", API_KEY);
  toggleSettings(false);
}
</script>

</body>
</html>
