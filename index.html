<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS AI | Next Gen</title>

<style>
  :root {
    --primary: #00f2fe;
    --secondary: #4facfe;
    --bg-dark: #0f172a;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #19c37d;
  }

  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

  body {
    height: 100vh;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    color: white;
    overflow: hidden;
    display: flex;
  }

  /* Animated Background Drift */
  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20% 30%, rgba(79, 172, 254, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.1) 0%, transparent 50%);
    z-index: -1;
    animation: drift 20s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(15px);
    padding: 25px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--glass-border);
    z-index: 20;
  }

  .sidebar h2 { 
    font-size: 1.8rem; 
    margin-bottom: 30px; 
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .btn-sidebar {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 14px;
    color: white;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s ease;
    text-align: left;
  }

  .btn-sidebar:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateX(5px);
    border-color: var(--primary);
  }

  .new-chat-btn {
    background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
    border: none;
    font-weight: 600;
    box-shadow: 0 4px 15px rgba(79, 172, 254, 0.3);
  }

  /* Main Area */
  .main { flex: 1; display: flex; flex-direction: column; position: relative; }

  .chat-box {
    flex: 1;
    padding: 40px 40px 100px 40px; /* Extra bottom padding for credit */
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* Message Bubbles */
  .message {
    max-width: 75%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.6;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot { 
    background: var(--glass); 
    backdrop-filter: blur(10px); 
    border: 1px solid var(--glass-border); 
    align-self: flex-start; 
    border-bottom-left-radius: 4px; 
  }

  /* Input Container */
  .input-area { padding: 20px 30px 60px 30px; } /* Space for dev credit below */
  .input-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    padding: 8px;
    border: 1px solid var(--glass-border);
  }

  input {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: white;
    outline: none;
    font-size: 1rem;
  }

  .btn-action {
    background: transparent;
    border: none;
    color: white;
    padding: 10px 15px;
    cursor: pointer;
    font-size: 1.2rem;
    border-radius: 10px;
    transition: 0.2s;
  }

  .btn-action:hover { color: var(--primary); background: var(--glass); }

  /* Centered Developer Credit */
  .dev-credit {
    position: fixed;
    bottom: 20px;
    left: 280px; /* Accounts for sidebar width */
    right: 0;
    display: flex;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }

  .dev-credit-pill {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(10px);
    padding: 6px 18px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    font-size: 0.8rem;
    color: #94a3b8;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    pointer-events: auto;
  }

  .dev-credit-pill strong { color: var(--primary); margin-left: 4px; }

  /* Modals */
  .modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 15, 28, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: #1e293b;
    padding: 40px;
    border-radius: 24px;
    width: 380px;
    border: 1px solid var(--glass-border);
    text-align: center;
    animation: zoom 0.3s ease;
  }

  @keyframes zoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .hidden { display: none !important; }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

</style>
</head>

<body>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2 style="margin-bottom: 20px;">BOSS AI Login</h2>
    <input id="username" placeholder="Username" style="width:100%; background:#0f172a; border:1px solid #334155; margin-bottom:15px; border-radius:10px; color:white;">
    <input id="password" type="password" placeholder="Password" style="width:100%; background:#0f172a; border:1px solid #334155; margin-bottom:25px; border-radius:10px; color:white;">
    <button class="btn-sidebar new-chat-btn" style="width:100%; text-align:center;" onclick="login()">Enter System</button>
    <p id="error" style="color:#f87171; margin-top:15px; display:none;">Access Denied</p>
  </div>
</div>

<div class="sidebar">
  <h2>BOSS AI</h2>
  <button class="btn-sidebar new-chat-btn" onclick="newChat()">+ New Chat</button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">⚙️ Settings</button>
  <div id="history" style="flex:1"></div>
</div>

<div class="main">
  <div class="chat-box" id="chatBox">
    <div class="message bot">System Active. How can I assist you, Bhupendra?</div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Send a message..." onkeypress="handleKey(event)">
      <button class="btn-action" onclick="startListening()">🎤</button>
      <button class="btn-action" onclick="sendMessage()" style="color:var(--primary)">✦</button>
    </div>
  </div>
</div>

<div class="dev-credit">
  <div class="dev-credit-pill">
    Developed with ❤️ by <strong>Bhupendra Saini</strong>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h2 style="margin-bottom:15px;">API Configuration</h2>
    <input id="apiInput" type="password" placeholder="OpenRouter API Key" style="width:100%; background:#0f172a; border:1px solid #334155; margin-bottom:20px; border-radius:10px; color:white;">
    <div style="display:flex; gap:10px;">
      <button class="btn-sidebar new-chat-btn" style="flex:1; text-align:center;" onclick="saveAPI()">Save</button>
      <button class="btn-sidebar" style="flex:1; text-align:center;" onclick="toggleSettings(false)">Close</button>
    </div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("api_key") || "";
let currentUser = localStorage.getItem("user") || null;
let currentChat = [];

window.onload = () => {
  if (currentUser) document.getElementById('loginPage').classList.add('hidden');
};

function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

function login() {
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  if (pass === "bhupi2026") {
    currentUser = user;
    localStorage.setItem("user", user);
    document.getElementById('loginPage').classList.add('hidden');
  } else {
    document.getElementById('error').style.display = "block";
  }
}

function newChat() {
  currentChat = [];
  document.getElementById('chatBox').innerHTML = '<div class="message bot">New session started.</div>';
}

function addMessage(text, sender) {
  const chatBox = document.getElementById('chatBox');
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
  currentChat.push({ text, sender });
}

async function sendMessage() {
  const inputEl = document.getElementById('userInput');
  const message = inputEl.value.trim();
  if (!API_KEY) return toggleSettings(true);
  if (!message) return;

  addMessage(message, "user");
  inputEl.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.innerText = "...";
  document.getElementById('chatBox').appendChild(botMsg);

  try {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: currentChat.map(m => ({
          role: m.sender === "user" ? "user" : "assistant",
          content: m.text
        }))
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "Connection error.";

    botMsg.innerText = "";
    typeText(botMsg, reply);
    speak(reply);
    currentChat.push({ text: reply, sender: "bot" });
  } catch (error) {
    botMsg.innerText = "System Error.";
  }
}

function typeText(element, text) {
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(interval);
      document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    }
  }, 10);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1.1;
    window.speechSynthesis.speak(speech);
  }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.onresult = (e) => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    sendMessage();
  };
  function startListening() { recognition.start(); }
}

function toggleSettings(show) {
  const panel = document.getElementById('settingsPanel');
  show ? panel.classList.remove('hidden') : panel.classList.add('hidden');
}

function saveAPI() {
  API_KEY = document.getElementById('apiInput').value;
  localStorage.setItem("api_key", API_KEY);
  toggleSettings(false);
}
</script>

</body>
</html>
