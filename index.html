<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sidebar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7f6;
            color: #333;
        }

        /* Hamburger Button */
        #menu-btn {
            font-size: 24px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            padding: 12px 16px;
            margin: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #menu-btn:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        /* Sidebar Container */
        .sidebar {
            position: fixed;
            top: 0;
            left: -300px; /* Hidden state */
            width: 280px;
            height: 100%;
            background: #ffffff;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 20px;
        }

        /* Toggle class for JS */
        .sidebar.open {
            transform: translateX(300px);
        }

        .close-btn {
            display: block;
            margin-left: auto;
            font-size: 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
        }

        .sidebar ul {
            list-style: none;
            margin-top: 40px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.3s;
            color: #444;
        }

        .menu-item:hover {
            background: #f0f4ff;
            color: #2563eb;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
            z-index: 999;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <button id="menu-btn" aria-label="Open Menu">☰</button>

    <nav id="sidebar" class="sidebar">
        <button id="close-btn" class="close-btn" aria-label="Close Menu">✕</button>
        <ul>
            <li class="menu-item">🏠 &nbsp; Home</li>
            <li class="menu-item">👤 &nbsp; Profile</li>
            <li class="menu-item">⚙️ &nbsp; Settings</li>
            <li class="menu-item">📞 &nbsp; Contact</li>
        </ul>
    </nav>

    <div id="overlay" class="overlay"></div>

    <script>
        const menuBtn = document.getElementById("menu-btn");
        const closeBtn = document.getElementById("close-btn");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        const toggleSidebar = (isOpen) => {
            sidebar.classList.toggle("open", isOpen);
            overlay.classList.toggle("active", isOpen);
        };

        menuBtn.addEventListener("click", () => toggleSidebar(true));
        closeBtn.addEventListener("click", () => toggleSidebar(false));
        overlay.addEventListener("click", () => toggleSidebar(false));
    </script>

</body>
</html>
