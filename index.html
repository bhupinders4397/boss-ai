<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS AI | Elite Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-glow: #00f2fe;
      --secondary-glow: #4facfe;
      --accent: #19c37d;
      --bg-dark: #0a0b10;
      --panel-bg: rgba(15, 17, 26, 0.98);
      --glass-border: rgba(255, 255, 255, 0.1);
      --user-msg: #2563eb;
      --bot-msg: rgba(255, 255, 255, 0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at top right, #1a1c2c, #0a0b10);
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 300px;
      height: 100vh;
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      padding: 25px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--glass-border);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 1024px) {
      .sidebar { position: relative; transform: translateX(0) !important; }
      .menu-toggle { display: none !important; }
    }

    @media (max-width: 1023px) {
      .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    }

    .btn-sidebar {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
    }
    .btn-sidebar:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-glow); }

    /* --- MAIN CONTENT --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .menu-toggle {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1100;
      cursor: pointer;
      background: rgba(10, 11, 16, 0.9);
      border: 1px solid var(--glass-border);
      padding: 10px;
      border-radius: 8px;
    }
    .bar { width: 22px; height: 2px; background: var(--primary-glow); margin: 4px 0; border-radius: 2px; }

    #welcome-bg {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      pointer-events: none;
      transition: opacity 0.5s;
      z-index: 1;
    }
    #welcome-bg h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      background: linear-gradient(to bottom, #fff, rgba(255,255,255,0.1));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    /* --- CHAT AREA --- */
    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 80px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      z-index: 2;
      scroll-behavior: smooth;
    }

    .message-container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 140px; /* Space for input + credit */
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }
    .user { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 4px; }
    .bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

    /* --- INPUT AREA & FOOTER FIX --- */
    .input-area {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px 20px 40px 20px; /* Padding bottom for credit space */
      background: linear-gradient(transparent, var(--bg-dark) 40%, var(--bg-dark));
      z-index: 10;
    }

    .input-container {
      max-width: 850px;
      margin: 0 auto;
      display: flex;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 8px 10px 8px 20px;
      backdrop-filter: blur(20px);
    }

    input { flex: 1; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
    
    .send-btn {
      background: var(--primary-glow);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .footer-credit {
      position: absolute;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-size: 0.65rem;
      color: #4b5563;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* --- MODALS --- */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
    .modal-content { background: #11121a; padding: 35px; border-radius: 20px; width: 100%; max-width: 380px; border: 1px solid var(--glass-border); text-align: center; }
    .hidden { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="menu-toggle" onclick="toggleSidebar()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="modal" id="loginPage">
  <div class="modal-content">
    <h2 style="margin-bottom: 20px; color: var(--primary-glow);">BOSS AI ACCESS</h2>
    <input id="username" placeholder="Username" style="width: 100%; margin-bottom: 15px; background: #000; border: 1px solid var(--glass-border); padding: 14px; border-radius: 10px; color: white;">
    <input id="password" type="password" placeholder="Access Code" style="width: 100%; margin-bottom: 20px; background: #000; border: 1px solid var(--glass-border); padding: 14px; border-radius: 10px; color: white;">
    <button class="btn-sidebar" style="background: var(--primary-glow); color: #000; font-weight: bold; text-align: center;" onclick="login()">INITIALIZE SYSTEM</button>
    <p id="error" style="color:#f87171; margin-top:15px; display:none; font-size: 0.8rem;">ACCESS DENIED: INVALID CREDENTIALS</p>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div style="margin-bottom: 40px;">
    <h2 style="color: var(--primary-glow); letter-spacing: 2px;">BOSS AI</h2>
    <p style="font-size: 0.7rem; color: #64748b;">ELITE INTERFACE V2.0</p>
  </div>
  <button class="btn-sidebar" onclick="newChat()">+ New Session</button>
  <button class="btn-sidebar" onclick="toggleSettings(true)">⚙️ API Configuration</button>
  <div style="margin-top: auto; font-size: 0.7rem; color: #334155;">System: Online<br>Secure Protocol Active</div>
</div>

<div class="main">
  <div id="welcome-bg">
    <p style="letter-spacing: 5px; color: var(--secondary-glow); font-size: 0.8rem;">CORE UNIT</p>
    <h1>BOSS AI</h1>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message-container" id="messageContainer"></div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <input id="userInput" placeholder="Command system..." onkeypress="handleKey(event)">
      <button class="send-btn" onclick="sendMessage()" id="sendBtn">
        <svg viewBox="0 0 24 24" style="width:18px; height:18px; fill:#000;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
    <div class="footer-credit">
      DEVELOPED BY <strong>BHUPENDRA SAINI</strong>
    </div>
  </div>
</div>

<div id="settingsPanel" class="modal hidden">
  <div class="modal-content">
    <h2 style="margin-bottom: 10px;">Settings</h2>
    <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 20px;">Enter your OpenRouter API Key</p>
    <input id="apiInput" type="password" placeholder="sk-or-v1-..." style="width: 100%; margin-bottom: 15px; background: #000; border: 1px solid var(--glass-border); padding: 14px; border-radius: 10px; color: white;">
    <button class="btn-sidebar" style="background: var(--accent); color: #000; font-weight: bold; text-align: center;" onclick="saveAPI()">SAVE KEY</button>
    <button class="btn-sidebar" style="text-align: center; border:none;" onclick="toggleSettings(false)">Cancel</button>
  </div>
</div>

<script>
  let API_KEY = localStorage.getItem("api_key") || "";
  let currentUser = localStorage.getItem("user") || null;
  let currentChat = [];

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
  }

  function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if (pass === "bhupi2026") {
      currentUser = user;
      localStorage.setItem("user", user);
      document.getElementById('loginPage').classList.add('hidden');
    } else {
      document.getElementById('error').style.display = "block";
    }
  }

  function newChat() {
    currentChat = [];
    document.getElementById('messageContainer').innerHTML = '';
    document.getElementById('welcome-bg').style.opacity = '1';
    if(window.innerWidth < 1024) toggleSidebar();
  }

  async function sendMessage() {
    const inputEl = document.getElementById('userInput');
    const message = inputEl.value.trim();
    if (!API_KEY) return toggleSettings(true);
    if (!message) return;

    document.getElementById('welcome-bg').style.opacity = '0';
    addMessage(message, "user");
    inputEl.value = "";

    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.textContent = "Processing...";
    document.getElementById('messageContainer').appendChild(botMsg);
    scrollBottom();

    try {
      const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { 
          "Authorization": `Bearer ${API_KEY}`, 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({
          model: "openai/gpt-3.5-turbo",
          messages: currentChat.map(m => ({ 
            role: m.sender === "user" ? "user" : "assistant", 
            content: m.text 
          }))
        })
      });
      
      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content || "API Error: Check your key.";
      
      botMsg.textContent = ""; 
      typeText(botMsg, reply);
    } catch (error) {
      botMsg.textContent = "System Failure: Check Connection.";
    }
  }

  function addMessage(text, sender) {
    const container = document.getElementById('messageContainer');
    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.textContent = text; 
    container.appendChild(msg);
    currentChat.push({ text, sender });
    scrollBottom();
  }

  function typeText(element, text) {
    let i = 0;
    const interval = setInterval(() => {
      element.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        currentChat.push({ text: text, sender: "bot" });
        scrollBottom();
      }
    }, 15);
  }

  function scrollBottom() {
    const cb = document.getElementById('chatBox');
    cb.scrollTop = cb.scrollHeight;
  }

  function toggleSettings(show) {
    const panel = document.getElementById('settingsPanel');
    show ? panel.classList.remove('hidden') : panel.classList.add('hidden');
  }

  function saveAPI() {
    const val = document.getElementById('apiInput').value;
    if(val) {
      API_KEY = val;
      localStorage.setItem("api_key", API_KEY);
      toggleSettings(false);
    }
  }

  window.onload = () => { 
    if (currentUser) document.getElementById('loginPage').classList.add('hidden'); 
  };
</script>

</body>
</html>
